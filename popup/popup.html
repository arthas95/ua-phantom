<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>UA Phantom</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="popup-container">

    <header class="header">
      <div>
        <h1>UA Phantom</h1>
        <p>Identité navigateur active</p>
      </div>

      <div class="status-dot"></div>
    </header>

    <section class="card">
      <div class="card-title">User-Agent actif</div>

      <div id="userAgent" class="value-box">
        Chargement...
      </div>

      <button id="copyUserAgent" class="button">
        Copier le User-Agent
      </button>
    </section>

    <section class="card">
      <div class="card-title">Fuseau horaire</div>

      <div id="timezone" class="value-box small">
        Chargement...
      </div>
    </section>

    <section class="card">
      <div class="card-title">Heure locale</div>

      <div id="localTime" class="value-box small">
        Chargement...
      </div>
    </section>

    <footer class="footer">
      V1 - Extension expérimentale
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
